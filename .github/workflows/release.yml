name: release

# Build (and, on a version tag, publish) both distributions:
#   * forgekernel      — pure-Python universal wheel + sdist (repo root)
#   * forgekernel_rs   — native abi3 wheels per platform (rust/forge-core)
#
# Pushes/PRs build + `twine check` only. Publishing runs ONLY on a v* tag and
# uses PyPI Trusted Publishing (OIDC) — no API tokens. Before the first tag,
# register both project names on PyPI and add this repo as a trusted publisher
# for each (environment: pypi). See RELEASING.md.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---- forgekernel (pure Python) -------------------------------------------
  sdist-pure:
    name: forgekernel sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-forgekernel
          path: dist/*

  # ---- forgekernel_rs (native abi3 wheels) ---------------------------------
  wheels-rs:
    name: forgekernel_rs wheels (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Build abi3 wheels
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/forge-core
          command: build
          args: --release --out ../../dist-rs
          # linux builds inside manylinux; macos/windows build natively
          manylinux: auto
      - uses: actions/upload-artifact@v4
        with:
          name: dist-rs-${{ matrix.os }}
          path: dist-rs/*

  wheels-rs-sdist:
    name: forgekernel_rs sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/forge-core
          command: sdist
          args: --out ../../dist-rs
      - uses: actions/upload-artifact@v4
        with:
          name: dist-rs-sdist
          path: dist-rs/*

  # ---- publish (tags only, Trusted Publishing) -----------------------------
  publish:
    name: publish to PyPI
    needs: [sdist-pure, wheels-rs, wheels-rs-sdist]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: {path: staged}
      - name: Collect forgekernel dist
        run: mkdir -p dist && cp staged/dist-forgekernel/* dist/
      - name: Publish forgekernel
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
      - name: Collect forgekernel_rs dist
        run: mkdir -p dist-rs && cp staged/dist-rs-*/* dist-rs/
      - name: Publish forgekernel_rs
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-rs

name: release

# Build (and, on a version tag, publish) both distributions:
#   * forgekernel      — pure-Python universal wheel + sdist (repo root)
#   * forgekernel_rs   — native abi3 wheels per platform (rust/forge-core)
#
# Pushes/PRs build + `twine check` only. Publishing runs ONLY on a v* tag and
# uses PyPI Trusted Publishing (OIDC) — no API tokens. Before the first tag,
# register both project names on PyPI and add this repo as a trusted publisher
# for each (environment: pypi). See RELEASING.md.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # ---- forgekernel (pure Python) -------------------------------------------
  sdist-pure:
    name: forgekernel sdist + wheel
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - run: pip install build twine
      - run: python -m build
      - run: twine check dist/*
      - uses: actions/upload-artifact@v4
        with:
          name: dist-forgekernel
          path: dist/*

  # ---- forgekernel_rs (native abi3 wheels) ---------------------------------
  # One abi3 wheel per (platform, libc) covers every CPython >= 3.11. The matrix
  # matches the architectures gitcad-mech's dependency marker installs on
  # (x86_64/AMD64/aarch64/arm64), across glibc + musl on Linux.
  wheels-rs:
    name: forgekernel_rs wheel (${{ matrix.id }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - {id: linux-x86_64,        os: ubuntu-latest,  target: x86_64,  manylinux: auto}
          - {id: linux-x86_64-musl,   os: ubuntu-latest,  target: x86_64,  manylinux: musllinux_1_2}
          - {id: linux-aarch64,       os: ubuntu-latest,  target: aarch64, manylinux: auto}
          - {id: linux-aarch64-musl,  os: ubuntu-latest,  target: aarch64, manylinux: musllinux_1_2}
          - {id: macos-x86_64,        os: macos-latest,   target: x86_64}
          - {id: macos-arm64,         os: macos-latest,   target: aarch64}
          - {id: windows-x64,         os: windows-latest, target: x64}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: {python-version: "3.12"}
      - name: Build abi3 wheel
        uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/forge-core
          command: build
          target: ${{ matrix.target }}
          manylinux: ${{ matrix.manylinux }}
          args: --release --out ../../dist-rs
      - uses: actions/upload-artifact@v4
        with:
          name: dist-rs-${{ matrix.id }}
          path: dist-rs/*

  wheels-rs-sdist:
    name: forgekernel_rs sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: PyO3/maturin-action@v1
        with:
          working-directory: rust/forge-core
          command: sdist
          args: --out ../../dist-rs
      - uses: actions/upload-artifact@v4
        with:
          name: dist-rs-sdist
          path: dist-rs/*

  # ---- publish (tags only, Trusted Publishing) -----------------------------
  # forgekernel (pure Python) publishes on its own — it depends only on its own
  # build, so a Rust-wheel hiccup can never block it.
  publish-forgekernel:
    name: publish forgekernel to PyPI
    needs: [sdist-pure]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: {name: dist-forgekernel, path: dist}
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist

  # forgekernel_rs publishes on a v* tag OR a manual run (workflow_dispatch) —
  # the manual path lets it ship without re-releasing forgekernel.
  publish-forgekernel-rs:
    name: publish forgekernel_rs to PyPI
    needs: [wheels-rs, wheels-rs-sdist]
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write        # OIDC for Trusted Publishing
    steps:
      - uses: actions/download-artifact@v4
        with: {path: staged}
      - name: Collect forgekernel_rs dist
        run: mkdir -p dist-rs && cp staged/dist-rs-*/* dist-rs/
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist-rs
